<!doctype html>
<html lang="zh-CN" data-theme="mono-light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FAFAFA" />
    <meta name="format-detection" content="telephone=no, address=no, email=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="CountDown" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>CountDown</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500;1,9..144,600;1,9..144,700&family=Space+Grotesk:wght@400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script>
      /* Apply theme synchronously BEFORE first paint to avoid flash. */
      (function () {
        try {
          var THEMES = ['mono-light', 'mono-dark', 'paper', 'cyberpunk'];
          var t = null;
          var sp = new URLSearchParams(location.search);
          var q = sp.get('theme');
          if (q && THEMES.indexOf(q) !== -1) {
            t = q;
          } else {
            var s = localStorage.getItem('countdown.settings.v1');
            if (s) {
              try {
                var p = JSON.parse(s);
                var st = p && p.state && p.state.theme;
                if (THEMES.indexOf(st) !== -1) t = st;
              } catch (e) {}
            }
          }
          if (!t) {
            t = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'mono-dark' : 'mono-light';
          }
          document.documentElement.setAttribute('data-theme', t);
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) {
            meta.setAttribute('content',
              t === 'mono-dark'  ? '#0A0A0A' :
              t === 'paper'      ? '#F2EAD6' :
              t === 'cyberpunk'  ? '#080010' : '#FAFAFA');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
